oy sauce","1 tbsp olive oil","Salt and pepper","Sesame seeds"],instructions:["Cut the chicken into bite-sized pieces and season with salt and pepper.","Heat oil in a pan and cook the chicken until golden and fully cooked through.","Add minced garlic and sauté for a minute until fragrant.","Mix honey and soy sauce in a bowl, then pour over the chicken and stir well.","Let the sauce simmer until it thickens and coats the chicken evenly.","Sprinkle sesame seeds on top and serve hot with rice or vegetables."],tags:["chicken","quick","dinner","sweet"]},{id:"beef-tacos",name:"Beef Tacos",image:"https://images.unsplash.com/photo-1601924638867-3ec2f9b8c0f3?w=800&q=80",description:"Flavorful beef tacos filled with seasoned meat, fresh vegetables, and delicious toppings. A perfect meal for taco nights.",region:"American",cuisine:"Mexican",prepTime:"15 min",cookTime:"15 min",totalTime:"30 min",servings:4,difficulty:"Easy",ingredients:["400g ground beef","8 taco shells","1 tomato, diced","1 cup lettuce","1/2 cup cheese","1 tsp paprika","Salt and pepper","Sour cream"],instructions:["Cook the ground beef in a pan over medium heat until browned and fully cooked.","Add paprika, salt, and pepper, then mix well to evenly season the meat.","Warm the taco shells in the oven or on a pan for a few minutes.","Fill each taco shell with the cooked beef mixture.","Top with lettuce, tomato, cheese, and a spoon of sour cream.","Serve immediately while warm for the best taste and texture."],tags:["tacos","beef","mexican","quick"]},{id:"chicken-burger",name:"Chicken Burger",image:"https://images.unsplash.com/photo-1606755962773-d324e9a13086?w=800&q=80",description:"Juicy chicken burger with crispy edges, fresh lettuce, and creamy sauce. A delicious homemade alternative to fast food.",region:"American",cuisine:"Fast Food",prepTime:"15 min",cookTime:"20 min",totalTime:"35 min",servings:2,difficulty:"Easy",ingredients:["2 chicken fillets","2 burger buns","Lettuce","Tomato slices","Cheese slices","Mayonnaise","Salt and pepper"],instructions:["Season the chicken fillets with salt and pepper on both sides.","Cook the chicken in a pan or grill until golden and fully cooked.","Toast the burger buns lightly for better texture.","Spread mayonnaise on the buns, then add lettuce and tomato.","Place the chicken on top and add cheese if desired.","Close the burger and serve immediately while hot."],tags:["burger","chicken","fast food","lunch"]},{id:"cheesecake",name:"Classic Cheesecake",image:"https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=800&q=80",description:"Smooth and creamy classic cheesecake with a buttery crust. This dessert is rich, indulgent, and perfect for any occasion.",region:"European",cuisine:"Dessert",prepTime:"20 min",cookTime:"50 min",totalTime:"1h 10 min",servings:6,difficulty:"Medium",ingredients:["200g biscuits","100g butter","400g cream cheese","1/2 cup sugar","2 eggs","1 tsp vanilla extract"],instructions:["Crush the biscuits into fine crumbs and mix with melted butter to form the base.","Press the mixture into a baking pan and chill in the fridge for 15 minutes.","In a bowl, mix cream cheese, sugar, eggs, and vanilla until smooth.","Pour the mixture over the crust and spread evenly.","Bake in a preheated oven at 160°C for about 50 minutes.","Let it cool completely before slicing and serving."],tags:["dessert","cake","cheesecake","sweet"]}],Q0=s=>jt.find(f=>f.id===s);function X0(){const s=[jt.find(r=>r.id==="pasta-carbonara"),jt.find(r=>r.id==="southern-fried-chicken"),jt.find(r=>r.id==="beef-bourguignon"),jt.find(r=>r.id==="classic-cheeseburger"),jt.find(r=>r.id==="tiramisu"),jt.find(r=>r.id==="spanish-paella")],f=jt.filter(r=>r.region==="American").slice(0,4),d=jt.filter(r=>r.region==="European").slice(0,4);return o.jsxs("div",{children:[o.jsx(Y0,{}),o.jsx("section",{className:"bg-white border-b border-stone-200",children:o.jsx("div",{className:"max-w-7xl mx-auto px-4 py-8 grid grid-cols-2 md:grid-cols-4 gap-6 text-center",child
