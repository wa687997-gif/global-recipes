e top-3 left-3 flex gap-2",children:[o.jsx("span",{className:`px-2.5 py-1 rounded-full text-xs font-semibold ${f}`,children:s.difficulty}),o.jsx("span",{className:"px-2.5 py-1 rounded-full text-xs font-semibold bg-stone-900/80 text-white backdrop-blur-sm",children:s.cuisine})]}),o.jsx("div",{className:"absolute inset-0 bg-gradient-to-t from-black/40 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"})]}),o.jsxs("div",{className:"p-5 flex flex-col flex-1",children:[o.jsx("h3",{className:"font-serif text-lg font-bold text-stone-900 group-hover:text-amber-700 transition-colors mb-2",children:s.name}),o.jsx("p",{className:"text-sm text-stone-500 line-clamp-2 mb-4 flex-1",children:s.description}),o.jsxs("div",{className:"flex items-center justify-between text-xs text-stone-400 border-t border-stone-100 pt-3",children:[o.jsxs("div",{className:"flex items-center gap-1",children:[o.jsx(Ir,{className:"w-3.5 h-3.5"}),o.jsx("span",{children:s.totalTime})]}),o.jsxs("div",{className:"flex items-center gap-1",children:[o.jsx(Kh,{className:"w-3.5 h-3.5"}),o.jsxs("span",{children:[s.servings," servings"]})]}),o.jsxs("div",{className:"flex items-center gap-1",children:[o.jsx(Xh,{className:"w-3.5 h-3.5"}),o.jsx("span",{children:s.difficulty})]})]})]})]})}const jt=[{id:"classic-cheeseburger",name:"Classic American Cheeseburger",description:"The quintessential American cheeseburger with a juicy beef patty, melted cheddar, fresh lettuce, tomato, and special sauce on a toasted brioche bun.",region:"American",cuisine:"American Classic",prepTime:"15 min",cookTime:"10 min",totalTime:"25 min",servings:4,difficulty:"Easy",ingredients:["1½ lbs ground beef (80/20 blend)","4 brioche hamburger buns","4 slices sharp cheddar cheese","4 leaves butter lettuce","4 slices ripe tomato","4 thin slices red onion","4 dill pickle slices","1 tsp salt","½ tsp black pepper","1 tsp garlic powder","2 tbsp butter (for toasting buns)","3 tbsp mayonnaise","1 tbsp ketchup","1 tbsp yellow mustard","1 tsp sweet pickle relish"],instructions:["Mix the mayonnaise, ketchup, mustard, and pickle relish in a small bowl to make the special sauce. Refrigerate until ready to use.","Divide the ground beef into 4 equal portions (about 6 oz each). Shape into patties slightly larger than the buns, making an indent in the center to prevent puffing.","Season both sides of each patty generously with salt, pepper, and garlic powder.","Preheat a cast iron skillet or grill to high heat. Cook patties for 3-4 minutes on the first side without pressing down.","Flip the patties and immediately place a slice of cheddar cheese on each. Cook for another 3 minutes for medium, or until desired doneness.","While patties cook, split the brioche buns and butter the cut sides. Toast them in a separate pan or on the grill until golden brown, about 1-2 minutes.","Spread the special sauce on both halves of each toasted bun. Layer the bottom bun with lettuce, tomato slice, the cheesy patty, onion, and pickle.","Place the top bun and serve immediately with your favorite side dishes."],image:"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=800&q=80",tags:["burger","beef","grill","classic"]},{id:"bbq-baby-back-ribs",name:"Smoky BBQ Baby Back Ribs",description:"Fall-off-the-bone tender baby back ribs slow-cooked and glazed with a smoky, sweet, and tangy homemade BBQ sauce.",region:"American",cuisine:"Southern BBQ",prepTime:"20 min",cookTime:"3 hrs 30 min",totalTime:"3 hrs 50 min",servings:4,difficulty:"Medium",ingredients:["2 racks baby back ribs (about 4 lbs total)","2 tbsp brown sugar","1 tbsp smoked paprika","1 tbsp garlic powder","1 tbsp onion powder","1 tsp cayenne pepper","1 tsp black pepper","2 tsp salt","1 tsp cumin","1 cup ketchup","½ cup apple cider vinegar","¼ cup brown sugar (for sauce)","2 tbsp Worcestershire sauce","1 tbsp liquid smoke","1 tsp hot sauce","½ cup water"],instructions:["Remove the membrane from the back of each rack of ribs by sliding a butter knife under the membrane and pulling it off with a paper towel.","Combine brown sugar, smoked paprika, garlic powder, onion powder, cayenne, black pepper, salt, and cumin in a bowl. Rub this dry rub generously all over both racks of ribs.","Wrap each rack tightly in aluminum foil. Refrigerate for at least 1 hour, or overnight for best results.","Preheat oven to 300°F (150°C). Place foil-wrapped ribs on a baking sheet, meat side up. Bake for 2.5 hours.","While ribs bake, make the BBQ sauce: Combine ketchup, apple cider vinegar, brown sugar, Worcestershire sauce, liquid smoke, hot sauce, and water in a saucepan. Simmer for 20 minutes, stirring occasionally.","Remove ribs from foil carefully. Increase oven to 400°F (200°C). Brush ribs generously with BBQ sauce on both sides.","Return ribs to the baking sheet, meat side up. Bake uncovered for 20-30 minutes, basting with more sauce halfway through, until the sauce is caramelized and sticky.","Let rest for 10 minutes, then cut between the bones to serve. Serve with extra BBQ sauce on the side."],image:"https://images.unsplash.com/photo-1544025162-d76694265947?w=800&q=80",tags:["bbq","ribs","pork","smoky"]},{id:"mac-and-cheese",name:"Creamy Baked Mac and Cheese",description:"Ultra-creamy baked macaroni and cheese made with a blend of sharp cheddar, gruyère, and a crispy panko breadcrumb topping.",region:"American",cuisine:"American Comfort Food",prepTime:"15 min",cookTime:"35 min",totalTime:"50 min",servings:8,difficulty:"Easy",ingredients:["1 lb elbow macaroni","4 tbsp unsalted butter","¼ cup all-purpose flour","3 cups whole milk","1 cup heavy cream","3 cups sharp cheddar cheese, shredded","1 cup gruyère cheese, shredded","1 tsp Dijon mustard","½ tsp smoked paprika","¼ tsp nutmeg","1 tsp salt","½ tsp black pepper","1 cup panko breadcrumbs","2 tbsp melted butter (for topping)","¼ cup fresh parsley, chopped"],instructions:["Preheat oven to 375°F (190°C). Grease a 9x13 inch baking dish. Cook macaroni in salted boiling water for 1 minute less than package directions (al dente). Drain and set aside.","In a large saucepan, melt 4 tablespoons butter over medium heat. Whisk in flour and cook for 1-2 minutes until golden and bubbly, stirring constantly.","Slowly pour in the milk and heavy cream while whisking continuously to prevent lumps. Cook until the sauce thickens enough to coat the back of a spoon, about 5-7 minutes.","Remove from heat. Stir in 2½ cups of the cheddar and all the gruyère until completely melted. Add Dijon mustard, paprika, nutmeg, salt, and pepper.","Fold the cooked macaroni into the cheese sauce until every piece is coated. Pour into the prepared baking dish.","In a small bowl, toss panko breadcrumbs with melted butter and remaining ½ cup of cheddar. Sprinkle evenly over the top.","Bake for 25-30 minutes until the top is golden brown and the edges are bubbling. Let rest for 5 minutes.","Garnish with fresh chopped parsley and serve immediately."],image:"https://images.unsplash.com/photo-1543339494-b4cd4f7ba686?w=800&q=80",tags:["pasta","cheese","comfort food","baked"]},{id:"new-england-clam-chowder",name:"New England Clam Chowder",description:"A thick, rich, and creamy New England-style clam chowder loaded with tender clams, potatoes, and salt pork, served in a bread bowl.",region:"American",cuisine:"New England",prepTime:"20 min",cookTime:"40 min",totalTime:"1 hr",servings:6,difficulty:"Medium",ingredients:["4 (6.5 oz) cans chopped clams, juice reserved","4 oz salt pork or thick-cut bacon, diced","2 tbsp unsalted butter","1 large onion, diced","2 celery stalks, diced","3 tbsp all-purpose flour","3 cups clam juice (from cans plus bottled)","2 cups heavy cream","1 lb Yukon Gold potatoes, peeled and cubed","2 bay leaves","1 tsp fresh thyme","½ tsp white pepper","Salt to taste","Fresh chives for garnish","Oyster crackers for serving"],instructions:["Drain the canned clams, reserving all the juice. Add bottled clam juice if needed to reach 3 cups total. Set clams aside.","In a large Dutch oven, cook the diced salt pork over medium heat until crispy and golden, about 8 minutes. Remove the pork pieces and set aside, leaving the rendered fat.","Add butter to the pot. Sauté the onion and celery until softened and translucent, about 5 minutes.","Sprinkle flour over the vegetables and stir constantly for 2 minutes to cook out the raw flour taste.","Gradually whisk in the reserved clam juice. Add cubed potatoes, bay leaves, and thyme. Bring to a boil, then reduce to a simmer.","Cook until potatoes are fork-tender, about 15-20 minutes. Use a fork to mash a few potato pieces against the side of the pot to thicken the chowder.","Stir in the heavy cream and the reserved clams. Cook gently for 5 minutes (do not boil). Season with white pepper and salt to taste.","Remove bay leaves. Ladle into bowls, garnish with crispy salt pork, fresh chives, and a pat of butter. Serve with oyster crackers."],image:"https://images.unsplash.com/photo-1588566565463-180a5b2090d2?w=800&q=80",tags:["soup","seafood","clam","creamy"]},{id:"southern-fried-chicken",name:"Southern Fried Chicken",description:"Crispy, golden, and perfectly seasoned Southern fried chicken with a crunchy buttermilk coating and juicy, tender meat inside.",region:"American",cuisine:"Southern",prepTime:"30 min",cookTime:"25 min",totalTime:"55 min + marinating",servings:6,difficulty:"Medium",ingredients:["3 lbs chicken pieces (thighs, drumsticks, breasts)","2 cups buttermilk","1 tbsp hot sauce","2 cups all-purpose flour","1 tbsp garlic powder","1 tbsp onion powder","2 tsp smoked paprika","1 tsp cayenne pepper","1 tsp dried oregano","1 tsp dried thyme","2 tsp salt","1 tsp black pepper","Vegetable oil for frying (about 3 cups)","Honey for drizzling (optional)"],instructions:["Combine buttermilk and hot sauce in a large bowl. Add chicken pieces, making sure they are fully submerged. Cover and refrigerate for at least 4 hours, preferably overnight.","In a large shallow dish, whisk together flour, garlic powder, onion powder, smoked paprika, cayenne, oregano, thyme, salt, and black pepper.","Remove chicken from buttermilk, letting excess drip off. Dredge each piece thoroughly in the seasoned flour, pressing firmly to adhere. Place on a wire rack and let rest 15 minutes.","Fill a large cast-iron skillet or Dutch oven with oil to a depth of about 1½ inches. Heat to 350°F (175°C). Use a thermometer for accuracy.","Carefully place chicken pieces in the hot oil, skin-side down, working in batches to avoid crowding. Do not move them for the first 5 minutes.","Fry for 12-15 minutes per side for dark meat, 10-12 minutes per side for breasts, maintaining oil temperature at 325°F. The chicken should reach an internal temp of 165°F.","Transfer fried chicken to a wire rack set over a baking sheet. Season with a light sprinkle of salt immediately.","Let rest for 5 minutes before serving. Drizzle with honey if desired. Serve with coleslaw and biscuits."],image:"https://images.unsplash.com/photo-1626645738196-c2a7c87a8f58?w=800&q=80",tags:["chicken","fried","southern","crispy"]},{id:"buffalo-wings",name:"Buffalo Chicken Wings",image:"https://images.unsplash.com/photo-1608039755401-742074f0548d",description:"Crispy baked chicken wings tossed in a fiery cayenne-butter Buffalo sauce, served with creamy blue cheese dressing and celery sticks.",region:"American",cuisine:"American Bar Food",prepTime:"15 min",cookTime:"45 min",totalTime:"1 hr",servings:4,difficulty:"Easy",ingredients:["3 lbs chicken wings, split into flats and drumettes","1 tbsp baking powder","1 tsp salt","½ tsp black pepper","½ tsp garlic powder","½ cup hot sauce (Frank's RedHot)","⅓ cup unsalted butter, melted","1 tbsp white vinegar","½ tsp Worcestershire sauce","½ tsp cayenne pepper","½ cup blue cheese crumbles","½ cup sour cream","¼ cup mayonnaise","1 tbsp lemon juice","Celery and carrot sticks for serving"],instructions:["Preheat oven to 425°F (220°C). Line a baking sheet with foil and place a wire rack on top. Pat chicken wings completely dry with paper towels.","Toss wings with baking powder, salt, pepper, and garlic powder in a large bowl. Arrange in a single layer on the wire rack.","Bake for 20 minutes, then flip the wings. Bake for another 20-25 minutes until the skin is golden and very crispy.","While wings bake, make the Buffalo sauce: Combine hot sauce, melted butter, vinegar, Worcestershire sauce, and cayenne in a saucepan. Warm over low heat, whisking until smooth.","Make the blue cheese dressing: Mash blue cheese crumbles with a fork. Mix with sour cream, mayonnaise, and lemon juice. Season with salt and pepper.","When wings are done, transfer to a large bowl. Pour the warm Buffalo sauce over the wings and toss until every piece is coated.","Arrange sauced wings on a serving platter. Serve immediately with blue cheese dressing, celery sticks, and carrot sticks on the side.","For extra-crispy wings, you can broil for 2-3 minutes after saucing, watching carefully to prevent burning."],tags:["wings","spicy","appetizer","buffalo"]},{id:"philly-cheesesteak",name:"Philly Cheesesteak",description:"An authentic Philadelphia cheesesteak with thinly sliced ribeye, melted provolone cheese, caramelized onions, and peppers on a crusty hoagie roll.",region:"American",cuisine:"Philadelphia",prepTime:"15 min",cookTime:"15 min",totalTime:"30 min",servings:4,difficulty:"Easy",ingredients:["1½ lbs ribeye steak, very thinly sliced","4 hoagie rolls","8 slices provolone cheese","1 large onion, thinly sliced","1 green bell pepper, thinly sliced","8 oz mushrooms, sliced","2 tbsp vegetable oil","2 tbsp butter","1 tsp salt","½ tsp black pepper","1 tsp garlic powder","1 tsp Worcestershire sauce"],instructions:["For easier slicing, freeze the ribeye for 30-45 minutes, then slice against the grain as thinly as possible.","Heat 1 tablespoon oil in a large skillet over medium-high heat. Add onions and peppers, cook until caramelized and soft, about 8-10 minutes. Remove and set aside.","In the same skillet, add remaining oil and butter. Increase heat to high. Add the sliced steak in a single layer (work in batches if needed).","Season with salt, pepper, garlic powder, and Worcestershire sauce. Cook for 2-3 minutes, using a spatula to chop and stir the meat.","Return the onions and peppers to the skillet. Add mushrooms and toss everything together for 1-2 minutes.","Divide the meat mixture into 4 portions in the skillet. Top each portion with 2 slices of provolone cheese. Cover with a lid or dome for 1 minute until cheese is melted.","Split the hoagie rolls and toast them briefly. Scoop each cheesy meat portion into a roll using a spatula.","Serve immediately while hot, with a side of hot cherry peppers or dipping au jus if desired."],image:"https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?w=800&q=80",tags:["sandwich","steak","cheese","philly"]},{id:"lobster-roll",name:"Maine Lobster Roll",description:"Sweet, succulent lobster meat dressed in lemon butter and a light mayo, piled high in a buttery, toasted split-top roll.",region:"American",cuisine:"New England",prepTime:"20 min",cookTime:"15 min",totalTime:"35 min",servings:4,difficulty:"Medium",ingredients:["1½ lbs cooked lobster meat (about 4 lobsters)","4 split-top hot dog buns (New England style)","3 tbsp mayonnaise","1 tbsp fresh lemon juice","2 tbsp unsalted butter, melted","1 stalk celery, finely diced","1 tbsp fresh chives, minced","1 tbsp fresh tarragon, minced","¼ tsp salt","⅛ tsp white pepper","2 tbsp butter (for toasting buns)","Lemon wedges for serving","Potato chips for serving"],instructions:["If using whole lobsters, boil in salted water for 8-10 minutes. Cool in an ice bath, then crack shells and extract the meat from claws, knuckles, and tail.","Cut the lobster meat into large bite-sized chunks. You want a mix of textures — do not chop too finely. Place in a bowl and refrigerate.","In a small bowl, whisk together mayonnaise, lemon juice, melted butter, salt, and white pepper.","Gently fold the dressing into the lobster meat along with the diced celery, chives, and tarragon. Be careful not to break up the meat too much. Refrigerate for 15 minutes.","Heat a skillet over medium heat. Butter the outside of each split-top bun generously. Toast in the skillet until golden brown on both sides, about 1-2 minutes per side.","Open the toasted buns and fill generously with the lobster salad, mounding it high.","Garnish with additional chives and serve immediately with lemon wedges and kettle-cooked potato chips.","For a Connecticut-style warm lobster roll, skip the mayo and toss lobster in warm drawn butter with lemon juice instead."],image:"https://images.unsplash.com/photo-1563379091339-03246963d4a9?w=800&q=80",tags:["seafood","lobster","sandwich","summer"]},{id:"classic-apple-pie",name:"Classic American Apple Pie",description:"A golden, flaky double-crust apple pie filled with cinnamon-spiced Granny Smith and Honeycrisp apples. The iconic American dessert.",region:"American",cuisine:"American Dessert",prepTime:"45 min",cookTime:"55 min",totalTime:"1 hr 40 min + chilling",servings:8,difficulty:"Medium",ingredients:["2½ cups all-purpose flour","1 cup (2 sticks) unsalted butter, cold and cubed","1 tsp salt","1 tbsp sugar","6-8 tbsp ice water","3 lbs mixed apples (Granny Smith and Honeycrisp)","¾ cup granulated sugar","2 tbsp all-purpose flour","1 tbsp cornstarch","1½ tsp cinnamon","¼ tsp nutmeg","¼ tsp allspice","1 tbsp lemon juice","2 tbsp butter, cut into small pieces","1 egg beaten with 1 tbsp water (egg wash)","2 tbsp coarse sugar for topping"],instructions:["Make the crust: Pulse flour, salt, and sugar in a food processor. Add cold cubed butter and pulse until pea-sized crumbs form. Drizzle in ice water, 1 tablespoon at a time, pulsing until dough just comes together.","Divide dough into two discs, wrap in plastic, and refrigerate for at least 1 hour.","Peel, core, and slice apples about ¼ inch thick. Toss with sugar, flour, cornstarch, cinnamon, nutmeg, allspice, and lemon juice. Let sit for 15 minutes.","Preheat oven to 425°F (220°C). Roll one disc of dough into a 12-inch circle on a floured surface. Transfer to a 9-inch pie dish, letting the excess hang over the edges.","Pour the apple filling into the crust, mounding it high in the center. Dot with small pieces of butter.","Roll out the second disc of dough. Place over the filling. Trim and crimp the edges decoratively. Cut several slits in the top crust for steam vents.","Brush the top with egg wash and sprinkle with coarse sugar. Place pie on a baking sheet. Bake at 425°F for 20 minutes, then reduce to 375°F and bake for 35-40 minutes more until golden.","Let the pie cool on a wire rack for at least 2 hours before slicing to allow the filling to set. Serve with vanilla ice cream."],image:"https://images.unsplash.com/photo-1621743478914-cc8a86d7e7b5?w=800&q=80",tags:["dessert","pie","apple","baking"]},{id:"fluffy-pancakes",name:"Fluffy American Pancakes",description:"Thick, fluffy buttermilk pancakes stacked high with butter and pure maple syrup. A beloved American breakfast classic.",region:"American",cuisine:"American Breakfast",prepTime:"10 min",cookTime:"20 min",totalTime:"30 min",servings:4,difficulty:"Easy",ingredients:["2 cups all-purpose flour","2 tbsp sugar","2 tsp baking powder","1 tsp baking soda","½ tsp salt","2 large eggs","1½ cups buttermilk","½ cup whole milk","¼ cup unsalted butter, melted","1 tsp vanilla extract","Butter for the pan","Pure maple syrup for serving","Fresh berries for topping","Whipped cream (optional)"],instructions:["Whisk together flour, sugar, baking powder, baking soda, and salt in a large bowl.","In a separate bowl, whisk together eggs, buttermilk, whole milk, melted butter, and vanilla extract.","Pour the wet ingredients into the dry ingredients. Stir gently with a spatula until just combined — the batter should still be slightly lumpy. Do NOT overmix.","Let the batter rest for 5 minutes. This allows the baking powder to activate and creates fluffier pancakes.","Heat a non-stick skillet or griddle over medium-low heat. Add a small pat of butter. Pour ⅓ cup of batter for each pancake.","Cook until bubbles form on the surface and the edges look set, about 2-3 minutes. Flip carefully and cook for another 1-2 minutes until golden brown.","Keep finished pancakes warm in a 200°F oven on a baking sheet while you cook the rest.","Stack 3-4 pancakes per serving. Top with a generous pat of butter, a drizzle of warm maple syrup, fresh berries, and whipped cream if desired."],image:"https://images.unsplash.com/photo-1567620905732-2d1ec7ab7445?w=800&q=80",tags:["breakfast","pancakes","brunch","classic"]},{id:"cobb-salad",name:"Classic Cobb Salad",description:"A hearty composed salad with rows of grilled chicken, crispy bacon, avocado, hard-boiled eggs, tomatoes, and blue cheese over crisp greens.",region:"American",cuisine:"California",prepTime:"25 min",cookTime:"15 min",totalTime:"40 min",servings:4,difficulty:"Easy",ingredients:["2 large chicken breasts","8 slices thick-cut bacon","4 large eggs","2 ripe avocados","2 cups cherry tomatoes, halved","1 head romaine lettuce, chopped","4 cups mixed greens","½ cup blue cheese crumbles","2 green onions, sliced","¼ cup red wine vinegar","1 tbsp Dijon mustard","½ cup extra-virgin olive oil","1 tsp salt","½ tsp black pepper","1 tsp dried herbs de Provence"],instructions:["Season chicken breasts with salt, pepper, and herbs. Grill or pan-sear over medium-high heat for 6-7 minutes per side until internal temp reaches 165°F. Let rest, then slice.","Cook bacon in a skillet until crispy. Drain on paper towels and crumble when cooled.","Place eggs in a saucepan, cover with cold water. Bring to a boil, cover, remove from heat, and let sit for 10 minutes. Transfer to ice water, peel, and quarter.","Halve and pit the avocados. Slice or dice them and squeeze a little lemon juice to prevent browning.","Make the vinaigrette: Whisk together red wine vinegar, Dijon mustard, salt, and pepper. Slowly drizzle in olive oil while whisking until emulsified.","Arrange the chopped romaine and mixed greens on a large platter or individual plates.","Arrange the sliced chicken, crumbled bacon, quartered eggs, avocado, cherry tomatoes, and blue cheese in neat rows or sections over the greens.","Sprinkle with sliced green onions. Drizzle the vinaigrette over the salad or serve on the side. Toss at the table just before eating."],image:"https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=800&q=80",tags:["salad","chicken","healthy","classic"]},{id:"cajun-jambalaya",name:"Cajun Jambalaya",description:"A bold, spicy one-pot rice dish from Louisiana loaded with andouille sausage, chicken, shrimp, and the holy trinity of Cajun cooking.",region:"American",cuisine:"Cajun / Creole",prepTime:"20 min",cookTime:"45 min",totalTime:"1 hr 5 min",servings:8,difficulty:"Medium",ingredients:["1 lb andouille sausage, sliced","1 lb chicken thighs, boneless, cubed","1 lb large shrimp, peeled and deveined","2 cups long-grain white rice","1 large onion, diced","2 celery stalks, diced","1 green bell pepper, diced","4 cloves garlic, minced","1 can (14 oz) diced tomatoes","4 cups chicken broth","2 tbsp Cajun seasoning","1 tsp dried thyme","2 bay leaves","2 tbsp vegetable oil","3 green onions, sliced","Hot sauce to taste"],instructions:["Heat oil in a large Dutch oven over medium-high heat. Brown the andouille sausage slices for 3-4 minutes. Remove and set aside.","Season cubed chicken with half the Cajun seasoning. Brown in the same pot for 4-5 minutes until golden. Remove and set aside with sausage.",'Add onion, celery, and bell pepper (the "holy trinity") to the pot. Sauté for 5 minutes until softened. Add garlic and cook 1 more minute.',"Add diced tomatoes, chicken broth, remaining Cajun seasoning, thyme, and bay leaves. Bring to a boil.","Stir in the rice, return the sausage and chicken to the pot. Reduce heat to low, cover tightly, and simmer for 20-25 minutes until rice is tender and liquid is absorbed.","Uncover and add the shrimp, pressing them into the rice. Cover and cook for 5 more minutes until shrimp are pink and curled.","Remove bay leaves. Fluff with a fork and taste for seasoning, adding more Cajun seasoning or hot sauce as desired.","Serve in deep bowls, garnished with sliced green onions and a bottle of hot sauce on the side."],image:"https://images.unsplash.com/photo-1632778149955-e80f8ceca2e8?w=800&q=80",tags:["cajun","rice","one-pot","spicy"]},{id:"pulled-pork",name:"Slow-Cooker Pulled Pork",description:"Melt-in-your-mouth pulled pork slow-cooked to perfection with a smoky spice rub and tangy Carolina-style vinegar sauce.",region:"American",cuisine:"Southern BBQ",prepTime:"15 min",cookTime:"8 hrs",totalTime:"8 hrs 15 min",servings:10,difficulty:"Easy",ingredients:["5 lb bone-in pork shoulder (Boston butt)","2 tbsp brown sugar","1 tbsp smoked paprika","1 tbsp chili powder","1 tbsp garlic powder","1 tbsp onion powder","1 tsp cumin","2 tsp salt","1 tsp black pepper","1 cup apple cider vinegar","½ cup ketchup","2 tbsp brown sugar (for sauce)","1 tbsp Worcestershire sauce","1 tsp red pepper flakes","10 brioche buns","Coleslaw for serving"],instructions:["Mix brown sugar, paprika, chili powder, garlic powder, onion powder, cumin, salt, and black pepper in a bowl to create the dry rub.","Pat the pork shoulder dry. Apply the rub all over the meat, covering every surface generously. You can do this the night before for best results.","Place the pork shoulder fat-side up in a slow cooker. Pour ½ cup of apple cider vinegar around the meat. Cover and cook on LOW for 8-10 hours.","While pork cooks, make the Carolina sauce: Combine remaining ½ cup vinegar, ketchup, brown sugar, Worcestershire sauce, and red pepper flakes in a saucepan. Simmer for 10 minutes.","When the pork is done, it should be fall-apart tender. Remove the bone (it should slide right out) and discard excess fat.","Shred the pork using two forks directly in the slow cooker. Pour the Carolina sauce over the shredded pork and toss to combine.","Let the pulled pork sit in the juices for 15-20 minutes to absorb all the flavors.","Serve piled high on toasted brioche buns topped with coleslaw. Offer extra sauce and pickles on the side."],image:"https://images.unsplash.com/photo-1529193591184-b1d58069ecdd?w=800&q=80",tags:["pork","bbq","slow cooker","sandwich"]},{id:"chicago-deep-dish-pizza",name:"Chicago Deep Dish Pizza",description:"An iconic thick-crusted Chicago-style deep dish pizza with layers of mozzarella, Italian sausage, and chunky tomato sauce.",region:"American",cuisine:"Chicago",prepTime:"30 min",cookTime:"35 min",totalTime:"1 hr 5 min + rising",servings:8,difficulty:"Hard",ingredients:["3¼ cups all-purpose flour","½ cup yellow cornmeal","1¼ tsp salt","1 tbsp sugar","2¼ tsp instant yeast","1¼ cups warm water","½ cup unsalted butter, melted","2 tbsp olive oil","1 lb sweet Italian sausage, casings removed","4 cups shredded low-moisture mozzarella","1 can (28 oz) San Marzano whole tomatoes, crushed","3 cloves garlic, minced","1 tsp dried oregano","1 tsp dried basil","½ tsp red pepper flakes","½ cup grated Parmesan cheese"],instructions:["Make the dough: Combine flour, cornmeal, salt, sugar, and yeast. Add warm water, melted butter, and olive oil. Mix until a soft dough forms. Knead for 5 minutes until smooth.","Place dough in a greased bowl, cover, and let rise in a warm place for 1-1.5 hours until doubled in size.","Brown the Italian sausage in a skillet, breaking it into crumbles. Drain excess fat and set aside.","Make the sauce: In a saucepan, combine crushed tomatoes, garlic, oregano, basil, and red pepper flakes. Simmer for 15 minutes.","Preheat oven to 425°F (220°C). Grease a 12-inch deep dish pizza pan or cast iron skillet with butter.","Press the risen dough into the pan, pushing it up the sides to form a 2-inch edge. Layer 3 cups of mozzarella on the bottom, then the cooked sausage.","Spread the tomato sauce evenly over the sausage layer. Top with remaining mozzarella and grated Parmesan.","Bake for 30-35 minutes until the crust is deep golden brown and the cheese is bubbly. Let rest for 10 minutes before slicing into wedges."],image:"https://images.unsplash.com/photo-1513104890138-7c749659a591?w=800&q=80",tags:["pizza","deep dish","chicago","italian sausage"]},{id:"classic-meatloaf",name:"Classic American Meatloaf",description:"A homestyle glazed meatloaf made with a savory beef and pork blend, topped with a sweet and tangy ketchup glaze.",region:"American",cuisine:"American Comfort Food",prepTime:"15 min",cookTime:"1 hr",totalTime:"1 hr 15 min",servings:8,difficulty:"Easy",ingredients:["1½ lbs ground beef","½ lb ground pork","1 cup breadcrumbs","½ cup whole milk","2 large eggs","1 medium onion, finely diced","3 cloves garlic, minced","2 tbsp Worcestershire sauce","1 tsp salt","½ tsp black pepper","1 tsp dried thyme","½ cup ketchup","2 tbsp brown sugar","1 tbsp apple cider vinegar","1 tsp Dijon mustard"],instructions:["Preheat oven to 375°F (190°C). Line a baking sheet with parchment paper or use a loaf pan.",'Soak breadcrumbs in milk for 5 minutes. This is the "panade" that keeps meatloaf moist.',"In a large bowl, combine ground beef, ground pork, soaked breadcrumbs, eggs, onion, garlic, Worcestershire sauce, salt, pepper, and thyme.","Mix with your hands until just combined — do not overwork the mixture or the meatloaf will be dense.","Shape the mixture into a loaf on the prepared baking sheet, or press into a loaf pan. Make it slightly domed on top.","Mix together ketchup, brown sugar, apple cider vinegar, and Dijon mustard for the glaze. Spread half of it over the top and sides of the meatloaf.","Bake for 45 minutes, then spread the remaining glaze on top. Bake for 15 more minutes until internal temperature reaches 160°F.","Let rest for 10 minutes before slicing. Serve with mashed potatoes and green beans."],image:"https://images.unsplash.com/photo-1529694157872-4e0c0f3b238b?w=800&q=80",tags:["beef","comfort food","dinner","classic"]},{id:"biscuits-and-gravy",name:"Biscuits and Sausage Gravy",description:"Flaky, buttery Southern biscuits smothered in a rich, peppery sausage gravy. The ultimate Southern breakfast experience.",region:"American",cuisine:"Southern",prepTime:"15 min",cookTime:"25 min",totalTime:"40 min",servings:6,difficulty:"Easy",ingredients:["2 cups all-purpose flour","1 tbsp baking powder","¼ tsp baking soda","1 tsp salt","6 tbsp cold unsalted butter, cubed","¾ cup cold buttermilk","1 lb breakfast sausage (pork)","¼ cup all-purpose flour (for gravy)","2½ cups whole milk","½ cup heavy cream","1 tsp black pepper","½ tsp salt","¼ tsp cayenne pepper","Fresh sage leaves (optional)"],instructions:["Preheat oven to 450°F (230°C). For biscuits: Whisk flour, baking powder, baking soda, and salt. Cut in cold butter until mixture looks like coarse crumbs.","Add cold buttermilk and stir until just combined. Turn onto a floured surface, pat to 1-inch thickness. Fold in half and pat out again. Repeat twice.","Cut biscuits with a 2.5-inch round cutter, pressing straight down without twisting. Place on a baking sheet touching each other. Bake for 12-15 minutes until tall and golden.","For the gravy: Brown the breakfast sausage in a large skillet over medium heat, breaking it into crumbles, about 8 minutes.","Sprinkle ¼ cup flour over the browned sausage. Stir and cook for 1-2 minutes.","Gradually pour in the milk and heavy cream while stirring constantly. Cook until the gravy thickens, about 5-7 minutes.","Season generously with black pepper, salt, and cayenne. The gravy should be thick, creamy, and loaded with sausage.","Split the warm biscuits in half, place on plates, and ladle the sausage gravy generously over the top. Garnish with fresh sage if desired."],image:"https://images.unsplash.com/photo-1588166524941-3bf61a9c41db?w=800&q=80",tags:["breakfast","southern","biscuits","gravy"]},{id:"key-lime-pie",name:"Key Lime Pie",description:"A tangy, creamy Key lime pie with a buttery graham cracker crust and billowy whipped cream topping. A taste of the Florida Keys.",region:"American",cuisine:"Florida",prepTime:"20 min",cookTime:"20 min",totalTime:"40 min + chilling",servings:8,difficulty:"Easy",ingredients:["1½ cups graham cracker crumbs","⅓ cup sugar","6 tbsp unsalted butter, melted","4 large egg yolks","2 cans (14 oz each) sweetened condensed milk","¾ cup fresh Key lime juice (or regular lime juice)","1 tbsp Key lime zest","1½ cups heavy whipping cream","3 tbsp powdered sugar","1 tsp vanilla extract","Lime slices for garnish"],instructions:["Preheat oven to 350°F (175°C). Mix graham cracker crumbs, sugar, and melted butter. Press firmly into the bottom and sides of a 9-inch pie dish.","Bake the crust for 8 minutes until lightly golden. Remove and let cool slightly. Keep oven on.","In a large bowl, whisk egg yolks with sweetened condensed milk until smooth and thick. Add lime juice and zest, whisking until well combined.","Pour the filling into the prepared crust. The filling should be thick and creamy.","Bake for 15 minutes until the filling is set but still slightly jiggly in the center. It will firm up as it cools.","Let cool to room temperature, then refrigerate for at least 4 hours or overnight until completely chilled and set.","Before serving, whip the heavy cream with powdered sugar and vanilla until stiff peaks form.","Top the chilled pie with whipped cream (pipe it for a professional look). Garnish with lime slices and extra zest. Keep refrigerated."],image:"https://images.unsplash.com/photo-1519915028121-7d3463d20b13?w=800&q=80",tags:["dessert","pie","lime","florida"]},{id:"grilled-cheese",name:"Ultimate Grilled Cheese Sandwich",description:"A golden, crispy grilled cheese with a blend of three cheeses, caramelized onions, and a touch of garlic butter on sourdough bread.",region:"American",cuisine:"American Classic",prepTime:"10 min",cookTime:"10 min",totalTime:"20 min",servings:2,difficulty:"Easy",ingredients:["4 slices sourdough bread","2 oz sharp cheddar cheese, sliced","2 oz gruyère cheese, sliced","2 oz fontina cheese, sliced","3 tbsp unsalted butter, softened","1 clove garlic, minced","½ tsp fresh thyme leaves","1 small onion, thinly sliced","1 tbsp butter (for onions)","1 tsp balsamic vinegar","Tomato soup for serving (optional)"],instructions:["Caramelize the onions: Melt 1 tablespoon butter in a small skillet over medium-low heat. Add sliced onions and cook slowly for 15-20 minutes until deeply golden. Add balsamic vinegar in the last minute.","Mix softened butter with minced garlic and thyme leaves to create garlic herb butter.","Layer the cheeses on two slices of bread: start with cheddar, then fontina, add caramelized onions, then top with gruyère. Place the remaining bread slices on top.","Spread the garlic herb butter generously on the outside of each sandwich.","Heat a cast-iron skillet over medium-low heat. Place sandwiches in the skillet buttered-side down.","Cook for 3-4 minutes on the first side until deep golden brown. Press gently with a spatula. You want low-and-slow cooking to melt the cheese evenly.","Flip carefully and cook another 3-4 minutes until the second side is golden and all the cheese is melted and gooey.","Cut diagonally and serve immediately alongside a bowl of warm tomato soup for dipping."],image:"https://images.unsplash.com/photo-1528735602780-2552fd46c7af?w=800&q=80",tags:["sandwich","cheese","comfort food","quick"]},{id:"new-york-cheesecake",name:"New York Style Cheesecake",description:"A dense, rich, and velvety smooth New York-style cheesecake with a buttery graham cracker crust and fresh strawberry topping.",region:"American",cuisine:"New York",prepTime:"25 min",cookTime:"1 hr 15 min",totalTime:"1 hr 40 min + chilling",servings:12,difficulty:"Medium",ingredients:["2 cups graham cracker crumbs","⅓ cup sugar","½ cup unsalted butter, melted","4 (8 oz) packages cream cheese, softened","1¼ cups sugar","1 tsp vanilla extract","½ tsp almond extract","5 large eggs","2 egg yolks","¼ cup all-purpose flour","⅓ cup heavy cream","1 cup sour cream","1 lb fresh strawberries","¼ cup strawberry jam, warmed"],instructions:["Preheat oven to 475°F (245°C). Wrap the outside of a 9-inch springform pan with aluminum foil. Combine graham cracker crumbs, sugar, and butter. Press into the bottom and 1 inch up the sides of the pan.","Beat cream cheese until smooth and fluffy, about 3 minutes. Add sugar gradually and beat until incorporated. Add vanilla and almond extract.","Add eggs and yolks one at a time, beating on low speed after each just until combined. Do not overbeat — this causes cracking.","Gently fold in flour, heavy cream, and sour cream by hand until just incorporated.","Pour the batter into the prepared crust. Place the springform pan in a larger roasting pan. Pour hot water into the roasting pan to come 1 inch up the sides (water bath).","Bake at 475°F for 12 minutes, then reduce to 300°F without opening the oven. Bake for 60-65 more minutes until edges are set but center still jiggles slightly.","Turn off the oven, crack the door open, and let the cheesecake cool in the oven for 1 hour. Then refrigerate for at least 8 hours or overnight.","Before serving, arrange sliced strawberries on top and brush with warm strawberry jam for a beautiful glaze. Run a knife around the edge before releasing the springform."],image:"https://images.unsplash.com/photo-1533134242443-d4fd215305ad?w=800&q=80",tags:["dessert","cheesecake","new york","baking"]},{id:"french-onion-soup",name:"French Onion Soup",description:"A deeply caramelized onion soup in a rich beef broth, topped with a crusty crouton and bubbling melted Gruyère cheese. A Parisian classic.",region:"European",cuisine:"French",prepTime:"15 min",cookTime:"1 hr 15 min",totalTime:"1 hr 30 min",servings:6,difficulty:"Medium",ingredients:["6 large yellow onions, thinly sliced","4 tbsp unsalted butter","2 tbsp olive oil","1 tsp sugar","1 tsp salt","3 tbsp all-purpose flour","1 cup dry white wine","8 cups beef broth","2 sprigs fresh thyme","2 bay leaves","1 tbsp balsamic vinegar","6 thick slices French baguette, toasted","2 cups Gruyère cheese, shredded","½ cup Parmesan cheese, grated","Fresh thyme for garnish"],instructions:["Melt butter with olive oil in a large Dutch oven over medium heat. Add all the sliced onions and toss to coat with the fat.","Cook onions for 10 minutes, stirring occasionally. Add sugar and salt, then reduce heat to medium-low. Continue cooking for 35-45 minutes, stirring every few minutes, until onions are deeply caramelized and jammy.","Sprinkle flour over the caramelized onions and stir for 2 minutes to cook out the raw flour taste.","Pour in the white wine and scrape up any browned bits from the bottom of the pot. Cook until wine is mostly evaporated.","Add beef broth, thyme sprigs, and bay leaves. Bring to a boil, then reduce to a simmer. Cook for 20 minutes.","Remove thyme and bay leaves. Stir in balsamic vinegar and season to taste.","Preheat your broiler. Ladle soup into oven-safe crocks. Place a toasted baguette slice on top of each. Pile generously with Gruyère and Parmesan.","Broil for 3-5 minutes until the cheese is bubbly, golden, and dripping over the edges. Garnish with fresh thyme and serve immediately."],image:"https://images.unsplash.com/photo-1547592166-23ac45744acd?w=800&q=80",tags:["soup","french","cheese","onion"]},{id:"beef-bourguignon",name:"Beef Bourguignon",description:"Julia Child's iconic French beef stew braised in red Burgundy wine with pearl onions, mushrooms, carrots, and bacon lardons.",region:"European",cuisine:"French",prepTime:"30 min",cookTime:"3 hrs",totalTime:"3 hrs 30 min",servings:8,difficulty:"Hard",ingredients:["3 lbs beef chuck, cut into 2-inch cubes","6 oz thick-cut bacon, diced","1 bottle (750ml) red Burgundy wine","2 cups beef broth","2 tbsp tomato paste","3 cloves garlic, minced","1 lb pearl onions, peeled","1 lb cremini mushrooms, quartered","4 carrots, cut into chunks","3 tbsp all-purpose flour","2 tbsp butter","2 tbsp olive oil","1 bouquet garni (thyme, parsley, bay leaf)","2 tsp salt","1 tsp black pepper","Fresh parsley for garnish"],instructions:["Pat beef cubes completely dry with paper towels. Season generously with salt and pepper.","Cook bacon in a large Dutch oven until crispy. Remove bacon, leaving the fat. Working in batches, sear beef cubes on all sides until deep brown, about 3-4 minutes per side. Remove and set aside.","In the same pot, sauté carrots for 2 minutes. Add garlic and tomato paste, stir for 1 minute. Sprinkle flour over the vegetables and stir for 2 minutes.","Pour in the entire bottle of wine and beef broth, scraping up all the browned bits. Bring to a simmer.","Return the beef and bacon to the pot. Add the bouquet garni. Cover and braise in a 325°F (165°C) oven for 2.5-3 hours until beef is fork-tender.","In a separate skillet, melt butter and sauté pearl onions until golden, about 8 minutes. Add mushrooms and cook until browned.","Add the onions and mushrooms to the stew for the last 30 minutes of cooking.","Remove bouquet garni. Adjust seasoning. Serve over buttered egg noodles or mashed potatoes, garnished with fresh chopped parsley."],image:"https://images.unsplash.com/photo-1534939561126-855b8675edd7?w=800&q=80",tags:["stew","french","beef","wine"]},{id:"pasta-carbonara",name:"Spaghetti Carbonara",description:"Authentic Roman spaghetti carbonara made with guanciale, Pecorino Romano, eggs, and black pepper. Creamy without any cream.",region:"European",cuisine:"Italian",prepTime:"10 min",cookTime:"15 min",totalTime:"25 min",servings:4,difficulty:"Medium",ingredients:["1 lb spaghetti","6 oz guanciale or pancetta, cut into small strips","4 large egg yolks","2 whole eggs","1 cup Pecorino Romano, finely grated","½ cup Parmigiano-Reggiano, finely grated","2 tsp freshly cracked black pepper","1 tbsp salt (for pasta water)","Extra Pecorino and black pepper for serving"],instructions:["Bring a large pot of water to a boil and add salt. This will be your only seasoning for the pasta, so be generous.","In a bowl, whisk together egg yolks, whole eggs, Pecorino Romano, and Parmigiano-Reggiano until smooth and creamy. Set aside.","Place guanciale strips in a cold skillet. Turn heat to medium and render slowly, cooking for 8-10 minutes until the fat is translucent and the meat is golden and crispy.","Cook spaghetti until al dente (1 minute less than package directions). Reserve 2 cups of starchy pasta water before draining.","Remove the guanciale pan from heat. Add the drained spaghetti to the guanciale skillet, tossing to coat in the rendered fat.","With the pan OFF the heat, pour the egg and cheese mixture over the pasta. Toss vigorously, adding pasta water a splash at a time, until a creamy, glossy sauce forms that coats every strand.","The residual heat will gently cook the eggs without scrambling them. If the sauce is too thick, add more pasta water. If too thin, toss over very low heat briefly.","Serve immediately in warm bowls, topped with extra cracked black pepper and a generous shower of Pecorino Romano."],image:"https://images.unsplash.com/photo-1612874742237-6526221588e3?w=800&q=80",tags:["pasta","italian","roman","classic"]},{id:"margherita-pizza",name:"Pizza Margherita",description:"A classic Neapolitan Margherita pizza with San Marzano tomato sauce, fresh mozzarella di bufala, fragrant basil, and extra virgin olive oil.",region:"European",cuisine:"Italian",prepTime:"20 min",cookTime:"12 min",totalTime:"32 min + rising",servings:4,difficulty:"Medium",ingredients:['3½ cups "00" flour or bread flour',"1½ tsp salt","1 tsp instant yeast","1 tsp sugar","1¼ cups warm water","2 tbsp extra-virgin olive oil","1 can (14 oz) San Marzano tomatoes","2 cloves garlic, minced","½ tsp salt (for sauce)","1 lb fresh mozzarella di bufala","Fresh basil leaves","Extra-virgin olive oil for drizzling","Semolina flour for dusting"],instructions:["Combine flour, salt, yeast, and sugar. Add warm water and olive oil. Mix until a shaggy dough forms, then knead for 8-10 minutes until smooth and elastic.","Place in an oiled bowl, cover with plastic wrap, and let rise for 1-2 hours until doubled. For best flavor, cold ferment in the fridge overnight.","Make the sauce: Crush the San Marzano tomatoes by hand. Mix with garlic and salt. Do not cook — the raw sauce will cook on the pizza.","Divide dough into 4 equal balls. Let rest for 30 minutes at room temperature.","Preheat oven to its highest setting (500-550°F / 260-290°C) with a pizza stone or inverted baking sheet inside for at least 30 minutes.","Stretch each dough ball by hand into a 10-12 inch round, leaving a slightly thicker edge (cornicione). Do not use a rolling pin.","On a semolina-dusted peel, spread a thin layer of sauce on each pizza. Tear fresh mozzarella and distribute over the top.","Slide onto the hot pizza stone. Bake for 8-12 minutes until the crust is charred in spots and the cheese is bubbly. Top with fresh basil and a drizzle of olive oil immediately after baking."],image:"https://images.unsplash.com/photo-1574071318508-1cdbab80d002?w=800&q=80",tags:["pizza","italian","neapolitan","vegetarian"]},{id:"spanish-paella",name:"Seafood Paella Valenciana",description:"A vibrant Spanish rice dish from Valencia with saffron-infused rice, shrimp, mussels, clams, chorizo, and sweet peas cooked in a wide paella pan.",region:"European",cuisine:"Spanish",prepTime:"30 min",cookTime:"45 min",totalTime:"1 hr 15 min",servings:6,difficulty:"Hard",ingredients:["2 cups Bomba or Calasparra rice","1 lb large shrimp, shell-on","1 lb mussels, cleaned and debearded","½ lb littleneck clams","4 oz Spanish chorizo, sliced","1 large onion, diced","1 red bell pepper, diced","4 cloves garlic, minced","1 can (14 oz) diced tomatoes","4 cups seafood or chicken broth, warmed","1 tsp saffron threads","1 tsp smoked paprika","½ cup frozen green peas","¼ cup olive oil","1 lemon, cut into wedges","Fresh parsley, chopped"],instructions:["Bloom the saffron threads in ½ cup of warm broth for at least 10 minutes. This releases the color and flavor.","Heat olive oil in a large paella pan (or wide, shallow skillet) over medium-high heat. Sear the shrimp for 1 minute per side. Remove and set aside.","In the same pan, cook chorizo until it releases its oil, about 3 minutes. Add onion and bell pepper, sauté for 5 minutes. Add garlic for 1 minute.","Stir in diced tomatoes and smoked paprika. Cook for 3 minutes until the tomatoes break down.","Add the rice to the pan and stir to coat every grain with the sofrito. Pour in the warm broth and saffron liquid. Stir once to distribute evenly, then DO NOT stir again.","Arrange mussels and clams (hinge-side down) into the rice. Cook over medium heat for 18-20 minutes without stirring. The rice should absorb the liquid and form a crispy bottom (socarrat).","Nestle the seared shrimp into the rice, scatter peas, and cover loosely with foil for 5 minutes until shellfish open and shrimp are pink.","Remove from heat. Discard any unopened mussels/clams. Garnish with lemon wedges and parsley. Serve directly from the pan."],image:"https://images.unsplash.com/photo-1534080564583-6be75777b70a?w=800&q=80",tags:["rice","seafood","spanish","saffron"]},{id:"fish-and-chips",name:"Classic Fish and Chips",image:"https://images.unsplash.com/photo-1579888944880-d98341245702",description:"Crispy beer-battered cod fillets with golden chunky chips, mushy peas, and tartar sauce. The iconic British pub dish.",region:"European",cuisine:"British",prepTime:"20 min",cookTime:"30 min",totalTime:"50 min",servings:4,difficulty:"Medium",ingredients:["4 cod fillets (6 oz each), skinless","1½ cups all-purpose flour","½ cup cornstarch","1 tsp baking powder","1 tsp salt","½ tsp black pepper","1 cup cold beer (lager)","2 lbs russet potatoes","Vegetable oil for deep frying","1 cup frozen peas","2 tbsp butter","1 tbsp fresh mint, chopped","½ cup mayonnaise","2 tbsp capers, chopped","2 tbsp gherkins, finely diced","1 tbsp lemon juice","Malt vinegar and lemon wedges"],instructions:["Peel potatoes and cut into thick chips (about ½ inch wide). Soak in cold water for 30 minutes to remove excess starch. Drain and pat very dry.","Heat oil in a deep fryer or large pot to 325°F (165°C). Blanch the chips for 5-6 minutes until just cooked but not browned. Remove and drain.","Make the tartar sauce: Mix mayo, capers, gherkins, and lemon juice. Refrigerate until serving.","Make the batter: Whisk flour, cornstarch, baking powder, salt, and pepper. Pour in cold beer and whisk until just combined — a few small lumps are fine. Keep the batter cold.","Increase oil temperature to 375°F (190°C). Pat fish fillets dry and dust lightly with flour. Dip each fillet in the batter, letting excess drip off.","Carefully lower battered fish into the hot oil. Fry for 6-8 minutes until deep golden and crispy, turning once. Drain on a wire rack.","Return chips to the 375°F oil and fry for 3-5 minutes until golden and crispy. Season immediately with salt.","Make mushy peas: Cook peas, then roughly mash with butter and mint. Serve fish and chips with mushy peas, tartar sauce, malt vinegar, and lemon wedges."],tags:["fish","british","fried","pub food"]},{id:"wiener-schnitzel",name:"Wiener Schnitzel",description:"The crown jewel of Viennese cuisine — a tender, pounded veal cutlet coated in golden breadcrumbs and pan-fried in butter until perfectly crispy.",region:"European",cuisine:"Austrian",prepTime:"20 min",cookTime:"10 min",totalTime:"30 min",servings:4,difficulty:"Medium",ingredients:["4 veal cutlets (5 oz each)","1 cup all-purpose flour","3 large eggs, beaten","2 cups fine breadcrumbs","1 tsp salt","½ tsp white pepper","½ cup (1 stick) unsalted butter","½ cup vegetable oil","2 lemons, cut into wedges","Fresh parsley for garnish","Lingonberry jam for serving","Potato salad for serving"],instructions:["Place each veal cutlet between two sheets of plastic wrap. Pound with a meat mallet until uniformly thin, about ¼ inch thick. The cutlet should be quite large.","Season both sides of each cutlet with salt and white pepper.","Set up a breading station: plate of flour, bowl of beaten eggs, plate of breadcrumbs. Dredge each cutlet in flour, shaking off excess.","Dip in beaten egg, letting excess drip off. Press into breadcrumbs, coating evenly. Do not press too hard — the coating should be light and loose for maximum crispiness.","Heat butter and oil in a large skillet over medium-high heat. The fat should be about ½ inch deep and shimmer when ready (about 340°F/170°C).","Fry each schnitzel for 2-3 minutes per side until golden brown. Gently swirl the pan during cooking — this creates the signature wavy, puffed-up crust.","Remove to a wire rack or paper towels. The crust should sound crispy when tapped. Do not cover or the steam will make it soggy.","Serve immediately on warm plates with lemon wedges (squeeze generously), lingonberry jam, and Austrian-style warm potato salad."],image:"https://images.unsplash.com/photo-1599921841143-819065a55cc6?w=800&q=80",tags:["veal","austrian","fried","classic"]},{id:"moussaka",name:"Greek Moussaka",description:"Layers of silky eggplant, spiced lamb ragù, and a thick, golden béchamel sauce baked until bubbly. Greece's most beloved casserole.",region:"European",cuisine:"Greek",prepTime:"40 min",cookTime:"1 hr",totalTime:"1 hr 40 min",servings:8,difficulty:"Hard",ingredients:["3 large eggplants, sliced ½ inch thick","1½ lbs ground lamb","1 large onion, diced","4 cloves garlic, minced","1 can (14 oz) crushed tomatoes","½ cup red wine","2 tbsp tomato paste","1 tsp cinnamon","½ tsp allspice","1 tsp dried oregano","4 tbsp butter (for béchamel)","¼ cup flour (for béchamel)","3 cups whole milk, warmed","¼ tsp nutmeg","1 cup Kefalotyri or Parmesan, grated","2 egg yolks","Olive oil, salt, and pepper"],instructions:["Salt the eggplant slices and let them sit in a colander for 30 minutes to draw out moisture. Pat dry and brush with olive oil. Broil or grill until golden on both sides.","Brown the ground lamb in a large skillet over high heat, breaking into crumbles. Drain excess fat. Add onion and cook until soft, about 5 minutes.","Add garlic, tomato paste, cinnamon, allspice, and oregano. Stir for 1 minute. Pour in red wine and cook until reduced by half.","Add crushed tomatoes, season with salt and pepper. Simmer for 20 minutes until thick. The meat sauce should not be watery.","Make béchamel: Melt butter, whisk in flour, cook 2 minutes. Gradually add warm milk, whisking constantly until thick and smooth. Season with nutmeg, salt, and pepper. Off heat, stir in ½ cup cheese and egg yolks.","Preheat oven to 375°F (190°C). In a greased 9x13 inch baking dish, layer half the eggplant slices, then all the meat sauce, then remaining eggplant.","Pour the béchamel sauce evenly over the top layer of eggplant. Sprinkle with remaining grated cheese.","Bake for 45-50 minutes until the top is deep golden and bubbly. Let rest for 20 minutes before cutting into squares — this is essential for clean slices."],image:"https://images.unsplash.com/photo-1574484284002-952d92456975?w=800&q=80",tags:["greek","lamb","eggplant","casserole"]},{id:"beef-stroganoff",name:"Beef Stroganoff",description:"Tender strips of beef in a luxurious sour cream and mushroom sauce, served over wide egg noodles. A classic Russian comfort dish.",region:"European",cuisine:"Russian",prepTime:"15 min",cookTime:"25 min",totalTime:"40 min",servings:4,difficulty:"Medium",ingredients:["1½ lbs beef sirloin or tenderloin, sliced into thin strips","12 oz egg noodles","8 oz cremini mushrooms, sliced","1 large onion, diced","3 cloves garlic, minced","2 tbsp butter","2 tbsp olive oil","3 tbsp all-purpose flour","1½ cups beef broth","1 tbsp Dijon mustard","1 cup sour cream","2 tbsp Worcestershire sauce","1 tsp paprika","1 tsp salt","½ tsp black pepper","Fresh parsley and dill for garnish"],instructions:["Cook egg noodles according to package directions. Drain, toss with a bit of butter, and keep warm.","Season beef strips with salt, pepper, and paprika. Heat oil in a large skillet over high heat. Sear beef in batches for 1-2 minutes until browned on the outside but still pink inside. Remove and set aside.","Reduce heat to medium. Add butter, then sauté onion for 4 minutes. Add mushrooms and cook until golden and their liquid has evaporated, about 5 minutes.","Add garlic and cook for 30 seconds. Sprinkle flour over the mushrooms and stir for 1 minute.","Pour in beef broth and Worcestershire sauce. Stir well, scraping up any browned bits. Bring to a simmer and cook until sauce thickens, about 5 minutes.","Reduce heat to low. Stir in Dijon mustard. Add sour cream and stir until smooth and creamy. Do not let it boil after adding the sour cream.","Return the seared beef (and any accumulated juices) to the sauce. Stir gently and heat through for 2 minutes.","Serve the stroganoff over the buttered egg noodles, garnished with freshly chopped parsley and dill."],image:"https://images.unsplash.com/photo-1504544750208-dc0358e63f7f?w=800&q=80",tags:["beef","russian","cream sauce","noodles"]},{id:"swedish-meatballs",name:"Swedish Meatballs (Köttbullar)",description:"Tender, well-spiced Swedish meatballs in a velvety cream sauce with lingonberry jam and buttery mashed potatoes.",region:"European",cuisine:"Swedish",prepTime:"25 min",cookTime:"25 min",totalTime:"50 min",servings:6,difficulty:"Medium",ingredients:["1 lb ground beef","½ lb ground pork","½ cup breadcrumbs","¼ cup heavy cream","1 egg","1 small onion, finely grated","¼ tsp allspice","¼ tsp nutmeg","1 tsp salt","½ tsp white pepper","3 tbsp butter","3 tbsp all-purpose flour","2 cups beef broth","1 cup heavy cream (for sauce)","2 tsp soy sauce","1 tsp Dijon mustard","Lingonberry jam for serving","Fresh dill for garnish"],instructions:["Soak breadcrumbs in ¼ cup heavy cream for 5 minutes. In a large bowl, combine beef, pork, soaked breadcrumbs, egg, grated onion, allspice, nutmeg, salt, and white pepper. Mix gently until just combined.","Roll the mixture into 1-inch meatballs (about 30-35 meatballs). Place them on a parchment-lined tray.","Melt 1 tablespoon butter in a large skillet over medium heat. Brown meatballs in batches, turning gently, for about 5-6 minutes until golden on all sides. Remove and set aside.","In the same skillet, melt remaining 2 tablespoons butter. Whisk in flour and cook for 1-2 minutes until golden.","Gradually whisk in beef broth and heavy cream. Cook, stirring constantly, until the sauce thickens and is smooth, about 5 minutes.","Stir in soy sauce and Dijon mustard. Return meatballs to the sauce. Simmer gently for 10-15 minutes until meatballs are cooked through.","Taste and adjust seasoning with salt and white pepper.","Serve the meatballs and cream sauce over buttery mashed potatoes with a generous spoonful of lingonberry jam on the side. Garnish with fresh dill."],image:"https://images.unsplash.com/photo-1529042410759-befb1204b468?w=800&q=80",tags:["meatballs","swedish","cream sauce","comfort food"]},{id:"french-crepes",name:"French Crêpes",image:"https://source.unsplash.com/800x600/?french-crepes",alt:"French Crêpes with caramel sauce"},{id:"french-crepes",name:"French Crêpes",image:"https://images.unsplash.com/photo-1541592106381-b31e9677c0e5?w=800&q=80",description:"Delicate, paper-thin French crêpes filled with Nutella, fresh strawberries, and whipped cream. Perfect for breakfast, dessert, or anytime.",region:"European",cuisine:"French",prepTime:"10 min",cookTime:"20 min",totalTime:"30 min + resting",servings:6,difficulty:"Easy",ingredients:["1 cup all-purpose flour","2 large eggs","1¼ cups whole milk","2 tbsp melted butter","1 tbsp sugar","¼ tsp salt","1 tsp vanilla extract","Butter for the pan","½ cup Nutella or chocolate spread","1 cup fresh strawberries, sliced","1 cup heavy whipping cream","2 tbsp powdered sugar","Banana slices (optional)","Powdered sugar for dusting"],instructions:["Combine flour, eggs, milk, melted butter, sugar, salt, and vanilla in a blender. Blend until completely smooth, about 30 seconds, scraping down the sides.","Refrigerate the batter for at least 30 minutes (or up to overnight). This allows the gluten to relax and creates more tender crêpes.","Whip the heavy cream with powdered sugar until soft peaks form. Refrigerate until ready to use.","Heat a non-stick 8-10 inch skillet or crêpe pan over medium heat. Add a small pat of butter and swirl to coat.","Pour about 3 tablespoons of batter into the pan, immediately tilting and swirling to cover the entire bottom in a thin, even layer.","Cook for about 1-2 minutes until the edges start to curl and the bottom is lightly golden. Flip carefully and cook 30 seconds more.","Stack finished crêpes on a plate with parchment paper between them.","To serve: Spread Nutella, add strawberries and banana, fold, top with whipped cream and powdered sugar."],tags:["breakfast","french","dessert","sweet"]},{id:"mushroom-risotto",name:"Mushroom Risotto",description:"A luxuriously creamy Italian risotto made with a medley of wild mushrooms, Arborio rice, white wine, and finished with butter and Parmigiano-Reggiano.",region:"European",cuisine:"Italian",prepTime:"15 min",cookTime:"30 min",totalTime:"45 min",servings:4,difficulty:"Medium",ingredients:["1½ cups Arborio rice","1 oz dried porcini mushrooms","8 oz mixed fresh mushrooms (cremini, shiitake, oyster)","6 cups chicken or vegetable broth, warmed","1 cup dry white wine","1 large shallot, finely diced","3 cloves garlic, minced","3 tbsp butter","2 tbsp olive oil","½ cup Parmigiano-Reggiano, grated","2 tbsp fresh parsley, chopped","1 tbsp fresh thyme leaves","1 tsp salt","½ tsp black pepper","Truffle oil for drizzling (optional)"],instructions:["Rehydrate dried porcini in 1 cup of hot water for 15 minutes. Strain through a fine sieve, reserving the soaking liquid (it's liquid gold for flavor). Chop the porcini.","Clean and slice all fresh mushrooms. In a large skillet, heat 1 tablespoon butter and sauté all mushrooms with thyme until golden and their moisture evaporates, about 8 minutes. Season and set aside.","In a wide, heavy-bottomed pan, heat olive oil and 1 tablespoon butter. Sauté shallot until translucent, about 3 minutes. Add garlic for 30 seconds.","Add the Arborio rice and stir for 2 minutes until each grain is coated and slightly translucent at the edges (tostatura).","Pour in white wine and stir until fully absorbed. Add the porcini soaking liquid.","Begin adding warm broth one ladle at a time, stirring frequently. Wait until each addition is mostly absorbed before adding the next. This process takes about 18-20 minutes.","When rice is al dente (creamy but with a slight bite), stir in the sautéed mushrooms, remaining butter, and Parmesan. The risotto should flow like lava (all'onda).","Serve immediately in warm bowls. Garnish with parsley, extra Parmesan, and a drizzle of truffle oil if desired."],image:"https://images.unsplash.com/photo-1476124369491-e7addf5db371?w=800&q=80",tags:["rice","italian","mushroom","vegetarian"]},{id:"gazpacho",name:"Andalusian Gazpacho",description:"A refreshing chilled Spanish soup made with ripe tomatoes, cucumbers, peppers, and sherry vinegar. The perfect summer starter.",region:"European",cuisine:"Spanish",prepTime:"20 min",cookTime:"0 min",totalTime:"20 min + chilling",servings:6,difficulty:"Easy",ingredients:["2 lbs ripe tomatoes, roughly chopped","1 large cucumber, peeled and chopped","1 red bell pepper, chopped","1 green bell pepper, chopped","2 cloves garlic","1 small red onion, chopped","3 tbsp sherry vinegar","⅓ cup extra-virgin olive oil","1 cup day-old bread, crusts removed, cubed","1 cup ice-cold water","1½ tsp salt","½ tsp cumin","Diced cucumber, pepper, and croutons for garnish","Extra-virgin olive oil for drizzling"],instructions:["Soak the bread cubes in water for 5 minutes until softened.","In a blender, combine tomatoes, cucumber, red bell pepper, half the green pepper, garlic, onion, and soaked bread. Blend until completely smooth.","With the blender running, slowly drizzle in olive oil and sherry vinegar. Add ice-cold water to reach desired consistency.","Season with salt and cumin. Blend one final time until velvety smooth.","Strain through a fine-mesh sieve for an ultra-smooth texture (optional but traditional for fine dining).","Transfer to a bowl, cover, and refrigerate for at least 2 hours until thoroughly chilled. The flavors will develop and meld as it sits.","Before serving, taste and adjust seasoning — cold soups need more salt than hot soups.","Serve in chilled bowls. Garnish with finely diced cucumber, green pepper, croutons, and a generous drizzle of extra-virgin olive oil."],image:"https://images.unsplash.com/photo-1529692236671-f1f6cf9683ba?w=800&q=80",tags:["soup","spanish","cold","summer"]},{id:"shepherds-pie",name:"Shepherd's Pie",description:"A hearty British classic with savory ground lamb in a rich gravy topped with creamy, golden-topped mashed potatoes.",region:"European",cuisine:"British",prepTime:"25 min",cookTime:"35 min",totalTime:"1 hr",servings:6,difficulty:"Medium",ingredients:["1½ lbs ground lamb","2 lbs russet potatoes, peeled and cubed","4 tbsp butter","½ cup heavy cream","1 large onion, diced","2 carrots, diced","2 celery stalks, diced","1 cup frozen peas","3 cloves garlic, minced","2 tbsp tomato paste","1 cup beef broth","1 tbsp Worcestershire sauce","2 tsp fresh rosemary, chopped","1 tsp fresh thyme","2 tbsp flour","1 cup shredded cheddar (for topping)","Salt and pepper to taste"],instructions:["Boil potatoes in salted water until fork-tender, about 15 minutes. Drain and mash with butter and cream until smooth. Season with salt and pepper.","Brown the ground lamb in a large oven-safe skillet over high heat, about 6-8 minutes. Drain excess fat, leaving about 2 tablespoons.","Add onion, carrots, and celery. Cook for 5 minutes until softened. Add garlic, rosemary, and thyme, cook 1 minute.","Stir in tomato paste and flour. Cook for 2 minutes. Pour in beef broth and Worcestershire sauce. Simmer until the gravy thickens, about 5 minutes.","Add frozen peas and stir to combine. Taste and adjust seasoning. Remove from heat.","Preheat broiler. Spread the mashed potatoes evenly over the meat filling, starting from the edges (to seal in the filling). Use a fork to create ridges on top.","Sprinkle shredded cheddar over the potatoes. Place under the broiler for 5-8 minutes until golden brown and bubbly.","Let rest for 10 minutes before serving. The filling should be bubbling around the edges. Serve with steamed green vegetables."],image:"https://images.unsplash.com/photo-1600891964092-4316c288032e?w=800&q=80",tags:["lamb","british","casserole","comfort food"]},{id:"bratwurst",name:"German Bratwurst with Sauerkraut",description:"Juicy pan-fried German bratwurst served on a pretzel roll with tangy sauerkraut, whole grain mustard, and crispy onions.",region:"European",cuisine:"German",prepTime:"10 min",cookTime:"25 min",totalTime:"35 min",servings:4,difficulty:"Easy",ingredients:["4 fresh bratwurst sausages","2 bottles (12 oz each) German beer","1 large onion, sliced into rings","2 cups sauerkraut, drained","4 pretzel rolls or hoagie buns","2 tbsp butter","2 tbsp vegetable oil","1 tbsp brown sugar","1 tsp caraway seeds","4 tbsp whole grain mustard","½ tsp black pepper","Fresh parsley for garnish"],instructions:["Place bratwursts in a large saucepan. Add beer and half the sliced onions. Bring to a simmer (not a boil) and cook for 10-15 minutes. This par-cooks the sausages and infuses flavor.","While simmering, heat butter in a skillet over medium heat. Cook remaining onion rings until caramelized and golden brown, about 12-15 minutes. Set aside.","In a separate pan, warm sauerkraut with brown sugar and caraway seeds over low heat for 10 minutes.","Remove bratwursts from the beer. Heat oil in a skillet or grill pan over medium-high heat. Sear bratwursts until the casings are crispy and deeply browned on all sides, about 3-4 minutes per side.","Split pretzel rolls and toast them lightly, either in the oven or on the grill.","Spread whole grain mustard on each roll. Place a bratwurst in each roll.","Top with a generous mound of warm sauerkraut and pile on the caramelized onions.","Garnish with parsley and serve with extra mustard on the side. Pairs perfectly with a cold German pilsner."],image:"https://images.unsplash.com/photo-1599921841143-819065a55cc6?w=800&q=80",tags:["sausage","german","beer","grill"]},{id:"tiramisu",name:"Classic Tiramisu",description:"The legendary Italian dessert with layers of espresso-soaked ladyfingers, rich mascarpone cream, and a generous dusting of cocoa powder.",region:"European",cuisine:"Italian",prepTime:"30 min",cookTime:"0 min",totalTime:"30 min + chilling",servings:8,difficulty:"Medium",ingredients:["6 egg yolks","¾ cup granulated sugar","1¼ cups mascarpone cheese (16 oz)","2 cups heavy whipping cream","2 cups strong espresso, cooled","3 tbsp Marsala wine or coffee liqueur","1 package (7 oz) Savoiardi ladyfingers","3 tbsp unsweetened cocoa powder","1 oz dark chocolate, shaved","1 tsp vanilla extract"],instructions:["Brew strong espresso (or use 2 tbsp instant espresso dissolved in 2 cups hot water). Let cool completely, then stir in Marsala wine.","In a heatproof bowl over simmering water (double boiler), whisk egg yolks with sugar until thick, pale, and ribbony, about 8-10 minutes. The mixture should reach 160°F. Remove from heat and cool.","Add mascarpone to the cooled egg mixture and whisk until smooth and creamy.","In a separate bowl, whip heavy cream with vanilla to stiff peaks. Gently fold the whipped cream into the mascarpone mixture in two additions, being careful not to deflate it.","Quickly dip each ladyfinger into the espresso — just a 1-2 second dip on each side. Do not soak them or they will get soggy and fall apart.","Arrange a layer of dipped ladyfingers in the bottom of a 9x13 inch dish or individual glasses. Spread half the mascarpone cream over the ladyfingers.","Repeat with a second layer of dipped ladyfingers and remaining cream. Smooth the top.","Cover and refrigerate for at least 6 hours (ideally overnight). Before serving, dust generously with cocoa powder through a sieve and top with chocolate shavings."],image:"https://images.unsplash.com/photo-1571877227200-a0d98ea607e9?w=800&q=80",tags:["dessert","italian","coffee","no-bake"]},{id:"croissants",name:"French Butter Croissants",description:"Flaky, buttery, golden French croissants with dozens of delicate layers. The art of laminated dough at its finest.",region:"European",cuisine:"French",prepTime:"1 hr",cookTime:"18 min",totalTime:"1 hr 18 min + chilling",servings:12,difficulty:"Hard",ingredients:["4 cups all-purpose flour","⅓ cup sugar","1 tbsp salt","2¼ tsp instant yeast","1¼ cups whole milk, lukewarm","1¼ cups (2½ sticks) European-style butter, cold","1 egg + 1 tbsp milk (egg wash)","Flour for dusting"],instructions:["Mix flour, sugar, salt, and yeast. Add lukewarm milk and stir until a dough forms. Knead briefly for 5 minutes — do not overwork. Wrap in plastic and refrigerate for 1 hour.","Pound the cold butter between parchment paper into a 7x7 inch square, about ½ inch thick. It should be cold but pliable.",'Roll the dough into a 10x14 inch rectangle. Place the butter square in the center. Fold the dough over the butter like an envelope (letter fold). This is the first "turn."',"Roll out the dough to a rectangle again and fold in thirds (second turn). Wrap and refrigerate for 30 minutes. Repeat rolling and folding for a third turn. Refrigerate again for 30 minutes.","Roll the dough into a large rectangle about ¼ inch thick. Using a sharp knife or pizza wheel, cut into triangles (base about 4 inches wide).","Starting from the base of each triangle, roll toward the point, gently stretching as you go. Curve the ends inward to form the classic crescent shape.","Place on parchment-lined baking sheets, point-side down. Cover loosely and let proof at room temperature for 1.5-2 hours until nearly doubled and jiggly.","Preheat oven to 400°F (200°C). Brush croissants gently with egg wash. Bake for 15-18 minutes until deeply golden and flaky. Cool on a wire rack. Best eaten within a few hours of baking."],image:"https://images.unsplash.com/photo-1509440159596-0249088772ff?w=800&q=80",tags:["pastry","french","breakfast","baking"]},{id:"greek-salad",name:"Classic Greek Salad (Horiatiki)",description:"A vibrant, refreshing Greek village salad with juicy tomatoes, crisp cucumbers, Kalamata olives, red onion, and a thick slab of creamy feta cheese.",region:"European",cuisine:"Greek",prepTime:"15 min",cookTime:"0 min",totalTime:"15 min",servings:4,difficulty:"Easy",ingredients:["4 large ripe tomatoes, cut into wedges","1 English cucumber, cut into half-moons","1 green bell pepper, sliced into rings","1 small red onion, thinly sliced","1 cup Kalamata olives","8 oz block feta cheese (sheep's milk)","¼ cup extra-virgin olive oil (high quality)","2 tbsp red wine vinegar","1 tsp dried oregano","½ tsp salt","¼ tsp black pepper","Capers (optional)","Crusty bread for serving"],instructions:["Cut tomatoes into large wedges and place in a large shallow bowl or platter. Season lightly with salt.","Add the cucumber half-moons, bell pepper rings, and thinly sliced red onion. Scatter the Kalamata olives throughout.","Place the entire block of feta cheese on top of the vegetables — do not crumble it. In Greece, it's served as a whole slab.","Drizzle the extra-virgin olive oil generously over everything. The quality of the olive oil is crucial here — use the best you have.","Sprinkle red wine vinegar over the salad. Season with dried oregano, salt, and pepper.","Add capers if using. Do NOT add lettuce — an authentic Horiatiki never contains it.","Let the salad sit for 5 minutes before serving to allow the flavors to meld and the tomatoes to release their juices.","Serve with thick slices of crusty bread to soak up the delicious olive oil and tomato juices. Each diner can break off pieces of feta as they eat."],image:"https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?w=800&q=80",tags:["salad","greek","vegetarian","fresh"]},{id:"belgian-waffles",name:"Belgian Waffles",description:"Light, crispy Belgian waffles with deep pockets, topped with whipped cream, fresh berries, and a dusting of powdered sugar.",region:"European",cuisine:"Belgian",prepTime:"15 min",cookTime:"20 min",totalTime:"35 min",servings:6,difficulty:"Easy",ingredients:["2 cups all-purpose flour","¾ cup sugar","3½ tsp baking powder","½ tsp salt","2 large eggs, separated","1½ cups warm milk","½ cup unsalted butter, melted","1 tsp vanilla extract","½ tsp cinnamon","1 cup pearl sugar (for Liège style, optional)","1 cup heavy whipping cream","2 tbsp powdered sugar","Fresh strawberries and blueberries","Maple syrup"],instructions:["In a large bowl, whisk together flour, sugar, baking powder, salt, and cinnamon.","In a separate bowl, whisk egg yolks with warm milk, melted butter, and vanilla extract.","Pour the wet mixture into the dry ingredients and stir until just combined.","In a clean bowl, beat egg whites with an electric mixer until stiff peaks form. This is the secret to extra-light, crispy waffles.","Gently fold the beaten egg whites into the batter in two additions, being careful to maintain the airiness.","Preheat your Belgian waffle iron and grease lightly. Pour enough batter to fill ⅔ of the waffle iron surface. Close and cook until deeply golden and crispy, about 3-5 minutes.","While waffles cook, whip heavy cream with powdered sugar to soft peaks.","Serve waffles immediately, topped with a generous dollop of whipped cream, fresh strawberries and blueberries, and a drizzle of maple syrup or a dusting of powdered sugar."],image:"https://images.unsplash.com/photo-1562376552-0d160a2f238d?w=800&q=80",tags:["breakfast","belgian","waffles","brunch"]},{id:"pierogi",name:"Polish Pierogi",description:"Handmade Polish dumplings filled with creamy potato and cheddar cheese, pan-fried in butter, and topped with caramelized onions and sour cream.",region:"European",cuisine:"Polish",prepTime:"45 min",cookTime:"20 min",totalTime:"1 hr 5 min",servings:6,difficulty:"Medium",ingredients:["3 cups all-purpose flour","1 large egg","¾ cup warm water","2 tbsp sour cream","½ tsp salt","2 lbs russet potatoes, peeled and cubed","1½ cups sharp cheddar cheese, shredded","2 tbsp butter (for filling)","4 tbsp butter (for frying)","2 large onions, diced","½ cup sour cream (for topping)","4 slices bacon, cooked and crumbled","Fresh chives, chopped","Salt and pepper to taste"],instructions:["Make the dough: Mound flour on a surface, make a well. Add egg, warm water, sour cream, and salt. Mix until a smooth, elastic dough forms. Knead for 5 minutes. Wrap in plastic and rest for 30 minutes.","Make the filling: Boil potatoes until tender. Drain and mash with butter, cheddar cheese, salt, and pepper until smooth. Let cool.","Roll dough to about ⅛ inch thickness on a floured surface. Cut circles using a 3-inch round cutter.","Place a heaping tablespoon of potato filling in the center of each circle. Fold dough over to form a half-moon. Pinch edges firmly to seal, pressing with a fork for a decorative edge.","Bring a large pot of salted water to a gentle boil. Cook pierogi in batches of 8-10 for 3-4 minutes. They will float to the surface when done. Remove with a slotted spoon.","Caramelize onions: Cook diced onions in 2 tablespoons butter over medium-low heat for 15-20 minutes until deeply golden.","In a large skillet, melt remaining butter over medium heat. Pan-fry the boiled pierogi until golden and crispy on both sides, about 2-3 minutes per side.","Serve the golden pierogi topped with caramelized onions, a dollop of sour cream, crumbled bacon, and fresh chives."],image:"https://images.unsplash.com/photo-1565557623262-b51c2513a641?w=800&q=80",tags:["dumplings","polish","potato","comfort food"]},{id:"ice-cream-sundae",name:"Classic Ice Cream Sundae",image:"https://images.unsplash.com/photo-1563805042-7684c019e1cb?w=800&q=80",description:"A classic ice cream sundae made with creamy vanilla ice cream, rich chocolate sauce, whipped cream, and crunchy toppings. This refreshing dessert is perfect for hot days and loved by both kids and adults.",region:"American",cuisine:"Dessert",prepTime:"10 min",cookTime:"0 min",totalTime:"10 min",servings:2,difficulty:"Easy",ingredients:["2 cups vanilla ice cream","1/2 cup chocolate sauce","1/4 cup whipped cream","2 tablespoons chopped nuts (almonds or peanuts)","2 tablespoons chocolate chips","Fresh cherries for topping","Caramel sauce (optional)","Sprinkles (optional)"],instructions:["Start by preparing your serving glasses or bowls. It is best to use chilled glasses to help keep the ice cream from melting too quickly. This small detail makes a big difference in presentation and texture.","Scoop the vanilla ice cream into the bowls, creating two or three generous scoops per serving. Make sure the scoops are smooth and round for a more professional and appealing look.","Slowly drizzle the chocolate sauce over the ice cream, allowing it to flow naturally down the sides. You can also add caramel sauce at this stage for extra richness and a deeper flavor combination.","Add a layer of whipped cream on top of the ice cream. You can use a piping bag to create a beautiful swirl or simply spoon it on for a more homemade feel.","Sprinkle chopped nuts and chocolate chips over the whipped cream to add crunch and texture. This contrast between creamy and crunchy makes the dessert more enjoyable.","Finish by placing a fresh cherry on top. You can also add colorful sprinkles if you want a more fun and vibrant presentation, especially for kids.","Serve immediately before the ice cream begins to melt. This dessert is best enjoyed fresh, with all its textures and flavors perfectly balanced."],tags:["dessert","ice cream","sweet","easy"]},{id:"mushroom-pasta",name:"Creamy Mushroom Pasta",image:"https://images.unsplash.com/photo-1525755662778-989d0524087e?w=800&q=80",description:"A rich and creamy mushroom pasta made with garlic, parmesan cheese, and a silky sauce. This comforting dish is perfect for a quick dinner and loved by pasta lovers.",region:"European",cuisine:"Italian",prepTime:"10 min",cookTime:"20 min",totalTime:"30 min",servings:3,difficulty:"Easy",ingredients:["200g pasta","1 cup mushrooms, sliced","2 cloves garlic, minced","1 cup heavy cream","1/2 cup parmesan cheese","2 tbsp butter","Salt and pepper","Fresh parsley"],instructions:["Boil the pasta in salted water until al dente, then drain and set aside while reserving a small amount of pasta water for the sauce.","In a large pan, melt butter over medium heat and sauté garlic until fragrant, then add mushrooms and cook until soft and golden brown.","Pour in the cream and let it simmer gently, stirring occasionally until it thickens slightly and develops a rich texture.","Add parmesan cheese and mix well until fully melted and combined into a smooth sauce.","Combine the cooked pasta with the sauce, adding a little pasta water if needed to loosen the mixture.","Season with salt and pepper, then garnish with fresh parsley before serving hot."],tags:["pasta","creamy","italian","dinner"]},{id:"honey-garlic-chicken",name:"Honey Garlic Chicken",image:"https://images.unsplash.com/photo-1604908554007-1d5c1d7b7a4b?w=800&q=80",description:"Sweet and savory honey garlic chicken with a sticky glaze that coats every bite. This quick and delicious recipe is perfect for busy weeknights.",region:"American",cuisine:"Asian Fusion",prepTime:"10 min",cookTime:"20 min",totalTime:"30 min",servings:4,difficulty:"Easy",ingredients:["500g chicken breast","3 cloves garlic","1/4 cup honey","2 tbsp s
